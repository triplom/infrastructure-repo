apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-app2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-app2
  template:
    metadata:
      labels:
        app: external-app2
    spec:
      containers:
      - name: external-app2
        image: ghcr.io/triplom/external-app2:prod # Replace with your actual image path and tag
        env:
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"