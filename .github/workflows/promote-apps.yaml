name: Promote Apps

# Chapter 5 (Push-based): Promote apps from dev → qa → prod
# Triggered manually (gate) or automatically after deploy-apps on main.
# In push-based CD, promotion means the pipeline updates and deploys to next env.
on:
  workflow_dispatch:
    inputs:
      source_environment:
        description: 'Promote FROM'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa]
      target_environment:
        description: 'Promote TO'
        required: true
        default: 'qa'
        type: choice
        options: [qa, prod]
      application:
        description: 'Application to promote'
        required: true
        default: 'all'
        type: choice
        options: [all, app1, app2]
      image_tag:
        description: 'Image tag to promote (leave blank for latest)'
        required: false
        default: 'latest'

  # Auto-promote dev→qa after a successful deploy-apps run on main
  workflow_run:
    workflows: ['Deploy Apps']
    types: [completed]
    branches: [main]

permissions:
  contents: write

env:
  IMAGE_PREFIX: triplom
  SRC_ENV: ${{ github.event.inputs.source_environment || 'dev' }}
  TGT_ENV: ${{ github.event.inputs.target_environment || 'qa' }}

jobs:
  promote:
    name: Promote ${{ github.event.inputs.application || 'all' }} — ${{ github.event.inputs.source_environment || 'dev' }} → ${{ github.event.inputs.target_environment || 'qa' }}
    runs-on: ubuntu-latest
    # Only run auto-promotion when the triggering workflow succeeded
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: ${{ github.event.inputs.target_environment || 'qa' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Resolve image tag to promote
        id: resolve_tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ] || [ "$TAG" = "latest" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Promoting tag: $TAG from ${{ env.SRC_ENV }} → ${{ env.TGT_ENV }}"

      - name: Update image tags for target environment
        env:
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          APP_INPUT="${{ github.event.inputs.application || 'all' }}"
          APPS=()
          if [ "$APP_INPUT" = "all" ]; then
            APPS=(app1 app2)
          else
            APPS=("$APP_INPUT")
          fi

          CHANGED=false
          for APP in "${APPS[@]}"; do
            KFILE="apps/${APP}/overlays/${{ env.TGT_ENV }}/kustomization.yaml"
            if [ -f "$KFILE" ]; then
              sed -i "s/newTag: .*/newTag: \"${TAG}\"/" "$KFILE"
              echo "Promoted $APP to tag ${TAG} in ${{ env.TGT_ENV }}"
              CHANGED=true
            else
              echo "kustomization not found: $KFILE — skipping"
            fi
          done

          if $CHANGED; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add apps/
            git diff --staged --quiet && echo "No changes" && exit 0
            git commit -m "promote: ${APP_INPUT} → ${{ env.TGT_ENV }} @ ${TAG} [skip ci]"
            git push
          fi

      - name: Configure kubeconfig for target cluster
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG }}"
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "KUBECONFIG secret not set — simulation mode"
            echo "Push-based promotion: CI deploys directly to target cluster"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_SECRET" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config use-context kind-${{ env.TGT_ENV }}-cluster

      - name: Deploy promoted apps to ${{ env.TGT_ENV }} (push-based)
        env:
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          APP_INPUT="${{ github.event.inputs.application || 'all' }}"
          APPS=()
          if [ "$APP_INPUT" = "all" ]; then
            APPS=(app1 app2)
          else
            APPS=("$APP_INPUT")
          fi

          for APP in "${APPS[@]}"; do
            OVERLAY="apps/${APP}/overlays/${{ env.TGT_ENV }}"
            if [ -d "$OVERLAY" ]; then
              echo "=== Push-based promote: ${APP} → ${{ env.TGT_ENV }} @ ${TAG} ==="
              kustomize build "$OVERLAY" | kubectl apply --server-side -f -
              kubectl rollout status deployment/${APP} \
                -n ${APP}-${{ env.TGT_ENV }} --timeout=120s || true
            else
              echo "Overlay not found: $OVERLAY — skipping"
            fi
          done

      - name: Promotion summary
        env:
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          echo "=== Promotion complete (push-based CD) ==="
          echo "Source: ${{ env.SRC_ENV }}"
          echo "Target: ${{ env.TGT_ENV }}"
          echo "Tag:    ${TAG}"
          echo "Method: Push-based — pipeline applies directly to target cluster"
          kubectl get pods --all-namespaces 2>/dev/null | grep -E 'app1|app2' || true
