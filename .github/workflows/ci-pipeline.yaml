name: Push-Based GitOps CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'apps/app1/**'
      - 'apps/app2/**'
      - '.github/workflows/ci-pipeline.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      component:
        description: 'Component to build and deploy'
        required: true
        default: 'app1'
        type: choice
        options:
          - app1
          - app2

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  determine-changes:
    name: Determine Changed Components
    runs-on: ubuntu-latest
    outputs:
      changed-apps: ${{ steps.changes.outputs.changed-apps }}
      deploy-component: ${{ steps.component.outputs.deploy-component }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect changed applications
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed-apps=[\"${{ github.event.inputs.component }}\"]" >> $GITHUB_OUTPUT
          else
            # Auto-detect changes in push events
            CHANGED_APPS=""
            if git diff --name-only HEAD^ HEAD | grep -q "^apps/app1/"; then
              CHANGED_APPS="$CHANGED_APPS,\"app1\""
            fi
            if git diff --name-only HEAD^ HEAD | grep -q "^apps/app2/"; then
              CHANGED_APPS="$CHANGED_APPS,\"app2\""
            fi
            CHANGED_APPS="[${CHANGED_APPS#,}]"
            echo "changed-apps=$CHANGED_APPS" >> $GITHUB_OUTPUT
          fi

      - name: Set deployment component
        id: component
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "deploy-component=${{ github.event.inputs.component }}" >> $GITHUB_OUTPUT
          else
            # For push events, use app1 as default
            echo "deploy-component=app1" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build and Push Application
    runs-on: ubuntu-latest
    needs: determine-changes
    strategy:
      matrix:
        app: ["app1"]
    outputs:
      image-tag: ${{ steps.image-tag.outputs.image-tag }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push container image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.app }}:latest
          cache-to: type=inline
      
      - name: Set image tag output
        id: image-tag
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Built and tagged: $IMAGE_TAG"

  deploy:
    name: Push-Based Deployment
    needs: [determine-changes, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      COMPONENT: ${{ needs.determine-changes.outputs.deploy-component }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Update application configuration locally
        run: |
          # Configure git for local updates
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          echo "Updating $COMPONENT with image: $IMAGE_TAG"
          
          # Update the image tag in the deployment
          DEPLOYMENT_FILE="apps/${COMPONENT}/base/deployment.yaml"
          if [[ -f "$DEPLOYMENT_FILE" ]]; then
            sed -i "s|image: ghcr.io/.*/.*:.*|image: $IMAGE_TAG|g" "$DEPLOYMENT_FILE"
            
            if git diff --quiet; then
              echo "No changes detected in $DEPLOYMENT_FILE"
            else
              git add "$DEPLOYMENT_FILE"
              git commit -m "Update $COMPONENT image to $IMAGE_TAG [skip ci]"
              git push origin main
              echo "Updated $COMPONENT configuration with new image: $IMAGE_TAG"
            fi
          else
            echo "Deployment file not found: $DEPLOYMENT_FILE"
            exit 1
          fi

      - name: Deploy using kubectl (Simulated)
        run: |
          echo "🚀 Push-Based Deployment Simulation"
          echo "Environment: $ENVIRONMENT"
          echo "Component: $COMPONENT"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Target cluster: kind-${ENVIRONMENT}-cluster"
          echo "✅ Push-based deployment completed successfully"
