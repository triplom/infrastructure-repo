# ArgoCD Repository Configuration Template
# Copy this file to github-repo.yaml and replace the placeholder values
# 
# Usage:
#   1. Copy: cp github-repo-template.yaml github-repo.yaml
#   2. Replace YOUR_GITHUB_USERNAME with your actual GitHub username
#   3. Replace YOUR_GITHUB_TOKEN with your actual GitHub Personal Access Token
#   4. Apply: kubectl apply -f github-repo.yaml
#
# Note: Never commit the actual github-repo.yaml file with real credentials!

apiVersion: v1
kind: Secret
metadata:
  name: infrastructure-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/triplom/infrastructure-repo.git
  username: YOUR_GITHUB_USERNAME
  password: YOUR_GITHUB_TOKEN
  insecure: "false"
  enableLfs: "false"