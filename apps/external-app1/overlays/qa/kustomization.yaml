apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ingress.yaml

namespace: external-app1-qa

patches:
- target:
    kind: Deployment
    name: external-app1
  patch: |-
    - op: add
      path: /spec/template/spec/imagePullSecrets
      value:
      - name: github-registry-secret

configMapGenerator:
- name: external-app1-config
  behavior: merge
  literals:
  - ENVIRONMENT=qa
  - LOG_LEVEL=DEBUG
