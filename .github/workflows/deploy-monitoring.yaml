name: Deploy Monitoring

# Chapter 5 (Push-based): Install Grafana, Prometheus, Alertmanager via kubectl push
on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/monitoring/**'
      - '.github/workflows/deploy-monitoring.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      component:
        description: 'Monitoring component'
        required: true
        default: 'all'
        type: choice
        options: [all, prometheus, grafana, alertmanager]

env:
  ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  validate:
    name: Validate Monitoring Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Validate monitoring manifests
        run: |
          OVERLAY="infrastructure/monitoring/overlays/${{ env.ENV }}"
          if [ -d "$OVERLAY" ]; then
            kustomize build "$OVERLAY" > /dev/null && echo "monitoring ${{ env.ENV }}: OK"
          elif [ -d "infrastructure/monitoring/base" ]; then
            kustomize build infrastructure/monitoring/base > /dev/null && echo "monitoring base: OK"
          else
            echo "No monitoring manifests found to validate"
          fi

  deploy:
    name: Deploy Monitoring (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Configure kubeconfig
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG }}"
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "KUBECONFIG secret not set — simulation mode"
            echo "Push-based monitoring deploy requires cluster access"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_SECRET" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config use-context kind-${{ env.ENV }}-cluster

      - name: Create monitoring namespace
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Add Prometheus Helm repo
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Deploy kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
        if: github.event.inputs.component == 'all' || github.event_name == 'push'
        run: |
          echo "=== Push-based: Deploying kube-prometheus-stack to ${{ env.ENV }} ==="
          OVERLAY="infrastructure/monitoring/overlays/${{ env.ENV }}"
          if [ -d "$OVERLAY" ]; then
            kustomize build "$OVERLAY" | kubectl apply --server-side -f -
          else
            # Fallback: apply kube-prometheus-stack via Helm
            helm upgrade --install kube-prometheus-stack \
              prometheus-community/kube-prometheus-stack \
              --namespace monitoring \
              --set grafana.adminPassword=admin \
              --set prometheus.prometheusSpec.scrapeInterval=30s \
              --wait --timeout 5m || echo "Helm install completed with warnings"
          fi
          echo "kube-prometheus-stack deployed (push-based)"

      - name: Deploy Prometheus only
        if: github.event.inputs.component == 'prometheus'
        run: |
          echo "=== Push-based: Deploying Prometheus to ${{ env.ENV }} ==="
          helm upgrade --install prometheus \
            prometheus-community/prometheus \
            --namespace monitoring \
            --wait --timeout 3m || true

      - name: Deploy Grafana only
        if: github.event.inputs.component == 'grafana'
        run: |
          echo "=== Push-based: Deploying Grafana to ${{ env.ENV }} ==="
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm upgrade --install grafana grafana/grafana \
            --namespace monitoring \
            --set adminPassword=admin \
            --wait --timeout 3m || true

      - name: Deploy Alertmanager only
        if: github.event.inputs.component == 'alertmanager'
        run: |
          echo "=== Push-based: Deploying Alertmanager to ${{ env.ENV }} ==="
          helm upgrade --install alertmanager \
            prometheus-community/alertmanager \
            --namespace monitoring \
            --wait --timeout 3m || true

      - name: Verify monitoring stack
        run: |
          echo "=== Push-based monitoring deployment summary ==="
          kubectl get pods -n monitoring 2>/dev/null || true
          kubectl get svc -n monitoring 2>/dev/null || true
          echo "Monitoring deployment complete (push-based CD)"
