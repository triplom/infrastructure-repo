apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ingress.yaml

namespace: external-app1-prod

patches:
- path: patches.yaml
  target:
    kind: Deployment
    name: external-app1

configMapGenerator:
- name: external-app1-config
  behavior: merge
  literals:
  - ENVIRONMENT=prod
  - LOG_LEVEL=WARN
