name: CI Pipeline

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - app1
          - app2

env:
  APP_NAME: ${{ github.event.inputs.component || 'app1' }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.inputs.component || 'app1' }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      CONFIG_REPO_PAT: ${{ secrets.CONFIG_REPO_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          COMPONENT="${{ github.event.inputs.component || 'app1' }}"
          if [ "$COMPONENT" = "all" ]; then
            COMPONENT="app1"  # Default to app1 for 'all'
          fi
          
          # Check if app exists in this repository
          if [ ! -d "apps/$COMPONENT" ]; then
            echo "App $COMPONENT not found in this repository, skipping tests"
            exit 0
          fi
          
          cd apps/$COMPONENT
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
            pip install pytest pytest-cov
          else
            echo "No requirements.txt found for $COMPONENT"
          fi
          
      - name: Run tests
        run: |
          COMPONENT="${{ github.event.inputs.component || 'app1' }}"
          if [ "$COMPONENT" = "all" ]; then
            COMPONENT="app1"  # Default to app1 for 'all'
          fi
          
          # Check if app exists in this repository
          if [ ! -d "apps/$COMPONENT" ]; then
            echo "App $COMPONENT not found in this repository, skipping tests"
            exit 0
          fi
          
          cd apps/$COMPONENT
          if [ -f "requirements.txt" ]; then
            pytest --cov=./ --cov-report=xml || echo "Tests failed but continuing"
          else
            echo "No Python tests to run for $COMPONENT"
          fi
          
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/*/coverage.xml
          fail_ci_if_error: false
  
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ steps.image-tag.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check if component exists
        id: check-component
        run: |
          COMPONENT="${{ env.APP_NAME }}"
          if [ ! -d "apps/$COMPONENT" ]; then
            echo "App $COMPONENT not found in this repository"
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Set lowercase repository owner
        if: steps.check-component.outputs.exists == 'true'
        id: lowercase
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - name: Log in to GitHub Container Registry
        if: steps.check-component.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      - name: Set up Docker Buildx
        if: steps.check-component.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3
      
      - name: Extract metadata
        if: steps.check-component.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.REPO_OWNER }}/${{ env.APP_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
      
      - name: Build and push Docker image
        if: steps.check-component.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ env.APP_NAME }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.lowercase.outputs.REPO_OWNER }}/${{ env.APP_NAME }}:latest
          cache-to: type=inline
          provenance: false
      
      - name: Set image tag output
        if: steps.check-component.outputs.exists == 'true'
        id: image-tag
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
  
  update-config:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      COMPONENT: ${{ github.event.inputs.component || 'all' }}
      CONFIG_REPO: 'triplom/infrastructure-repo-argocd'
    steps:
      - name: Checkout config repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_PAT }}
          fetch-depth: 0
      
      - name: Update application configuration
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          COMPONENT="${{ env.COMPONENT }}"
          
          # If component is 'all', update both app1 and app2
          if [ "$COMPONENT" = "all" ]; then
            APPS=("app1" "app2")
          else
            APPS=("$COMPONENT")
          fi
          
          for APP in "${APPS[@]}"; do
            echo "Updating $APP deployment for environment: ${{ env.ENVIRONMENT }}"
            echo "New image tag: $IMAGE_TAG"
            
            # Check if the app exists in the config repository
            if [ ! -d "apps/$APP" ]; then
              echo "App $APP not found in config repository, skipping"
              continue
            fi
            
            # Check if the environment overlay exists
            if [ -f "apps/$APP/overlays/${{ env.ENVIRONMENT }}/kustomization.yaml" ]; then
              echo "Using kustomize to update image in overlay for $APP"
              cd apps/$APP/overlays/${{ env.ENVIRONMENT }}
              
              # Install kustomize if not available
              if ! command -v kustomize &> /dev/null; then
                curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
                sudo mv kustomize /usr/local/bin/
              fi
              
              # Update image using kustomize
              kustomize edit set image $APP=$IMAGE_TAG
              cd ../../../../
              
            elif [ -f "apps/$APP/base/deployment.yaml" ]; then
              echo "Updating base deployment.yaml directly for $APP"
              sed -i "s|image: .*$APP:.*|image: $IMAGE_TAG|g" apps/$APP/base/deployment.yaml
            else
              echo "No deployment files found to update for $APP"
            fi
          done
          
          # Check if there are any changes to commit
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Configure git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Commit and push the changes
          git add .
          git commit -m "🚀 Update $COMPONENT image to $IMAGE_TAG for ${{ env.ENVIRONMENT }} environment

          Auto-update from external infrastructure-repo CI/CD pipeline
          - Environment: ${{ env.ENVIRONMENT }}
          - Component: ${{ env.COMPONENT }}
          - Image: $IMAGE_TAG
          - Triggered by: ${{ github.actor }}"
          
          git push origin main
