name: Deploy Apps

# Chapter 5 (Push-based): Build images → push to Docker Hub → kubectl apply to cluster
# This is the CI+CD pipeline — no GitOps operator; the pipeline itself pushes to cluster.
on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - '.github/workflows/deploy-apps.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      application:
        description: 'Application to deploy'
        required: true
        default: 'all'
        type: choice
        options: [all, app1, app2, external-app1, external-app2]

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: triplom
  ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ── Job 1: Build & push all app images ────────────────────────────────────
  build:
    name: Build & Push — ${{ matrix.app }}
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event_name == 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        app: [app1, app2]

    outputs:
      sha_tag: ${{ steps.sha_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA tag
        id: sha_tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.app }}
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ steps.sha_tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Built ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ steps.sha_tag.outputs.tag }}"

  # ── Job 2: Push-based deploy to cluster ───────────────────────────────────
  deploy:
    name: Deploy (push-based) — ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Configure kubeconfig
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG }}"
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "KUBECONFIG secret not set — simulation mode"
            echo "Push-based: in production, CI applies directly to cluster"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_SECRET" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config use-context kind-${{ env.ENV }}-cluster

      - name: Update image tags in kustomization (push-based GitOps)
        env:
          SHA_TAG: sha-${{ github.sha }}
        run: |
          # Push-based: CI updates the image tag and applies directly
          # (in pull-based GitOps, ArgoCD would reconcile this automatically)
          for APP in app1 app2; do
            KFILE="apps/${APP}/overlays/${{ env.ENV }}/kustomization.yaml"
            if [ -f "$KFILE" ]; then
              sed -i "s/newTag: .*/newTag: \"${SHA_TAG}\"/" "$KFILE"
              echo "Updated $APP image tag to ${SHA_TAG}"
            fi
          done

      - name: Deploy apps to ${{ env.ENV }} (push-based)
        run: |
          APP_INPUT="${{ github.event.inputs.application || 'all' }}"
          DEPLOY_APPS=()

          if [ "$APP_INPUT" = "all" ]; then
            DEPLOY_APPS=(app1 app2)
          else
            DEPLOY_APPS=("$APP_INPUT")
          fi

          for APP in "${DEPLOY_APPS[@]}"; do
            OVERLAY="apps/${APP}/overlays/${{ env.ENV }}"
            if [ -d "$OVERLAY" ]; then
              echo "=== Push-based deploy: ${APP} → ${{ env.ENV }} ==="
              kustomize build "$OVERLAY" | kubectl apply --server-side -f -
              kubectl rollout status deployment/${APP} \
                -n ${APP}-${{ env.ENV }} --timeout=120s || true
            else
              echo "Overlay not found: $OVERLAY — skipping"
            fi
          done

      - name: Deployment summary
        run: |
          echo "=== Push-based deployment complete ==="
          kubectl get pods -l app=app1 --all-namespaces 2>/dev/null || true
          kubectl get pods -l app=app2 --all-namespaces 2>/dev/null || true
          echo "Environment: ${{ env.ENV }}"
          echo "Method: Push-based CD (CI pipeline applies directly to cluster)"
